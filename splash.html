<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chargement...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f7fa; /* Solid color backup */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
            cursor: wait;
        }

        #splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* opacity: 0; Remove opacity to ensure visibility */
            /* animation: fadeInContainer 0.5s ease-out forwards; */
        }

        #logo-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            /* Start blurry, then clear up */
            animation: blurReveal 18s ease-in-out forwards; 
            display: block;
            opacity: 0;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 2s ease-out forwards 1s;
        }

        .loading-bar-container {
            width: 160px;
            height: 4px;
            background-color: rgba(0,0,0,0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 2px;
            /* Sync with 22s total duration */
            animation: loadProgress 22s linear forwards;
        }

        @keyframes blurReveal {
            0% { 
                filter: blur(20px); 
                opacity: 0; 
                transform: scale(0.9);
            }
            10% {
                opacity: 1;
            }
            100% { 
                filter: blur(0px); 
                opacity: 1; 
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            10% { width: 5%; }
            50% { width: 50%; }
            90% { width: 95%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="splash-container">
        <div id="logo-container">
            <img id="logo" src="./public/Logo.ico" alt="BlueFox">
        </div>
        <h1>BlueFox Browser</h1>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>
</body>
</html>
